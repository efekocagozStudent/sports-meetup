services:
    nginx:
        image: nginx:latest
        ports:
            - "8080:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf
            - .:/app
        depends_on:
            - php

    php:
        build:
            context: .
            dockerfile: PHP.Dockerfile
        volumes:
            - .:/app
        depends_on:
            - mysql

    mysql:
        image: mariadb:latest
        environment:
            MYSQL_ROOT_PASSWORD: 'secret123'
            MYSQL_DATABASE: 'sports_meetup'
        volumes:
            - mysqldata:/var/lib/mysql
            - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
        ports:
            - "3307:3306"

    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            - "8081:80"
        environment:
            - PMA_HOST=mysql

volumes:
    mysqldata: {}
